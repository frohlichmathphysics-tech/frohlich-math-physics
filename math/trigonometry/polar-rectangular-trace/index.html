<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polar &middot; Rectangular Trace &middot; AP Precalculus 3.15</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">

    <header class="top">
      <div class="eyebrow">AP PRECALCULUS &middot; TOPIC 3.15 &middot; APPLET</div>
      <div class="equation" id="equation" aria-live="polite">r = 6 sin(3&theta;)</div>
      <div class="curve-row">
        <label class="curve-row-label" for="curve-select">Curve</label>
        <select class="curve-select" id="curve-select" aria-label="Select curve">
          <option value="rose3">r = 6 sin(3&theta;)</option>
          <option value="limacon">r = 1 + 3 cos(&theta;)</option>
          <option value="dimpled">r = 4 + 2 sin(&theta;)</option>
          <option value="rose2">r = 3 sin(2&theta;)</option>
          <option value="spiral">r = &theta;</option>
        </select>
        <span class="caption" id="caption">Odd-petal rose &mdash; goes negative and retraces</span>
      </div>
    </header>

    <section class="canvases">
      <figure class="canvas-wrap">
        <figcaption class="canvas-title">Rectangular &middot; r vs &theta;</figcaption>
        <canvas id="rect-canvas" width="500" height="400" aria-label="Rectangular plot of r as a function of theta"></canvas>
      </figure>
      <figure class="canvas-wrap">
        <figcaption class="canvas-title">Polar &middot; y vs x</figcaption>
        <canvas id="polar-canvas" width="500" height="500" aria-label="Polar plot of the curve"></canvas>
      </figure>
    </section>

    <section class="controls">
      <div class="scrubber-row">
        <label class="scrubber-label" for="scrubber">&theta; scrubber</label>
        <input type="range" class="scrubber" id="scrubber"
               min="0" max="6.28319" step="0.01" value="0"
               aria-label="Theta scrubber">
      </div>

      <div class="buttons-row">
        <button class="btn btn-primary" id="play-pause" type="button" aria-label="Play or pause">Play</button>
        <div class="speed-group" role="group" aria-label="Playback speed">
          <button class="btn btn-speed" data-speed="0.5" type="button">0.5&times;</button>
          <button class="btn btn-speed is-active" data-speed="1" type="button">1&times;</button>
          <button class="btn btn-speed" data-speed="2" type="button">2&times;</button>
        </div>
        <button class="btn btn-secondary" id="reset" type="button">Reset</button>
        <button class="btn btn-toggle is-on" id="radial-toggle" type="button" aria-pressed="true">Radial line: ON</button>
      </div>

      <div class="readouts">
        <div class="readout-grid">
          <div class="readout-cell">
            <span class="readout-label">&theta;</span>
            <span class="readout-value" id="theta-readout">0.000 rad</span>
          </div>
          <div class="readout-cell">
            <span class="readout-label">r</span>
            <span class="readout-value" id="r-readout">0.000</span>
          </div>
          <div class="readout-cell">
            <span class="readout-label">|r|</span>
            <span class="readout-value" id="abs-r-readout">0.000</span>
            <span class="readout-sub">distance from pole</span>
          </div>
        </div>
        <div class="sign-indicator" id="sign-indicator">r = 0 (at pole)</div>
        <div class="behavior-banner">
          <div class="behavior-line" id="behavior-r">r is increasing</div>
          <div class="behavior-line" id="behavior-dist">At the pole</div>
        </div>
      </div>
    </section>

  </main>
  <script src="./app.js"></script>
</body>
</html>
