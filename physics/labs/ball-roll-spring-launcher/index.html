<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1100">
  <title>Ball Roll · Spring Launcher</title>
  <style>
    /* ============================================================
       LAYOUT
       ============================================================ */
    body {
      margin: 0;
      background: #10121E;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 1100px;
      background: #10121E;
    }
    #scene-wrap {
      position: relative;
      width: 1100px;
      height: 620px;
      background: #10121E;
    }
    #scene-wrap canvas {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
    }

    /* ============================================================
       MEASUREMENT TOOL WRAPPERS (.sw-wrap, .rl-wrap)
       Modules default to position: static — override to absolute so the
       left/top coordinates they set actually take effect.
       SVG content inside is filter-inverted to flip dark-on-dark to light-on-dark
       (modules were authored against a light page; their black dial face and
       ruler body disappear against our #10121E scene without this).
       hue-rotate(180deg) preserves color identity for any colored elements
       (e.g., a red hand inverts to cyan then rotates back to red).
       ============================================================ */
    .sw-wrap, .rl-wrap {
      position: absolute;
      z-index: 10;
    }
    .sw-wrap svg, .rl-wrap svg {
      filter: invert(1) hue-rotate(180deg);
    }

    footer {
      text-align: center;
      color: #FAF3DE;
      font-size: 11px;
      letter-spacing: 0.5px;
      padding: 12px 0 16px 0;
      background: #10121E;
    }

    /* ============================================================
       CONTROL STRIP
       ============================================================ */
    #controls {
      background: #10121E;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #2A3F5C;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .control-label {
      font-size: 11px;
      font-weight: bold;
      color: #FAF3DE;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .notch-row {
      display: flex;
    }
    .notch-btn {
      width: 36px;
      height: 36px;
      border: 2px solid #2E8B8B;
      background: transparent;
      color: #2E8B8B;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin: 0 3px;
      border-radius: 4px;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .notch-btn:hover {
      background: rgba(46, 139, 139, 0.15);
    }
    .notch-btn.active {
      background: #2E8B8B;
      color: white;
    }
    #launch-btn {
      background: #2E8B8B;
      color: white;
      border: none;
      width: 110px;
      height: 44px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
    }
    #launch-btn:hover:not(:disabled) {
      background: #34a0a0;
    }
    #launch-btn:disabled {
      background: #2A3F5C;
      color: #6a7080;
      cursor: not-allowed;
    }
    #reset-btn {
      background: transparent;
      color: #FAF3DE;
      border: 2px solid #FAF3DE;
      width: 90px;
      height: 44px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
    }
    #reset-btn:hover {
      background: rgba(250, 243, 222, 0.1);
    }
    #speed-select {
      background: #10121E;
      color: #FAF3DE;
      border: 2px solid #2E8B8B;
      padding: 8px 28px 8px 10px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #2E8B8B 50%),
                        linear-gradient(135deg, #2E8B8B 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-wrap">
      <canvas id="scene" width="1100" height="620"></canvas>
    </div>
    <div id="controls">
      <div class="control-group">
        <div class="control-label">NOTCH</div>
        <div class="notch-row">
          <button class="notch-btn active" data-notch="1">1</button>
          <button class="notch-btn" data-notch="2">2</button>
          <button class="notch-btn" data-notch="3">3</button>
          <button class="notch-btn" data-notch="4">4</button>
        </div>
      </div>
      <button id="launch-btn">LAUNCH</button>
      <button id="reset-btn">RESET</button>
      <div class="control-group">
        <div class="control-label">SPEED</div>
        <select id="speed-select">
          <option value="1.0">1.0×</option>
          <option value="0.5">0.5×</option>
          <option value="0.25">0.25×</option>
          <option value="0.1">0.1×</option>
        </select>
      </div>
    </div>
    <footer>Mr. Frohlich Math and Physics</footer>
  </div>

  <script src="../measurement-tools/manual-stopwatch/stopwatch.js"></script>
  <script src="../measurement-tools/ruler/ruler.js"></script>

  <script>
  (function () {
    'use strict';

    const PIXELS_PER_METER = 400;
    const TRACK_LEFT_X_PX  = 150;
    const TRACK_Y_PX       = 360;
    const TRACK_LENGTH_M   = 2.0;

    const NOTCH_SPEEDS = { 1: 0.3, 2: 0.6, 3: 0.9, 4: 1.2 };

    const VARIABILITY_FRACTION = 0.03;
    const VELOCITY_FLOOR_MPS   = 0.01;

    const MARKER_A_X_M   = 0.5;
    const MARKER_B_X_M   = 1.2;
    const RIGHT_WALL_X_M = 2.0;

    const BALL_RADIUS_PX = 7;

    const SPRING_RELEASE_DURATION_S = 0.15;

    const COLOR_BG        = '#10121E';
    const COLOR_TRACK     = '#2A3F5C';
    const COLOR_LAUNCHER  = '#2A3F5C';
    const COLOR_WALL      = '#2A3F5C';
    const COLOR_MARKER    = '#2E8B8B';
    const COLOR_LABEL     = '#FAF3DE';
    const COLOR_BALL_FILL = '#FAF3DE';
    const COLOR_BALL_RIM  = '#1E2A5C';

    const state = {
      currentNotch:        1,
      ballX_m:             0,
      ballVelocity_mps:    0,
      isMoving:            false,
      playbackMultiplier:  1.0,
      lastFrameTime:       null,
      springAnimating:     false,
      springAnimElapsed_s: 0,
      springReleased:      false,
    };

    const canvas      = document.getElementById('scene');
    const ctx         = canvas.getContext('2d');
    const sceneWrap   = document.getElementById('scene-wrap');
    const launchBtn   = document.getElementById('launch-btn');
    const resetBtn    = document.getElementById('reset-btn');
    const speedSelect = document.getElementById('speed-select');
    const notchBtns   = document.querySelectorAll('.notch-btn');

    function metersToPx(m) {
      return TRACK_LEFT_X_PX + m * PIXELS_PER_METER;
    }

    function sampleGaussian(mean, sigma) {
      let u1 = 0, u2 = 0;
      while (u1 === 0) u1 = Math.random();
      while (u2 === 0) u2 = Math.random();
      const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
      return mean + z * sigma;
    }

    function clamp01(x) {
      return x < 0 ? 0 : (x > 1 ? 1 : x);
    }

    function drawTrack() {
      ctx.strokeStyle = COLOR_TRACK;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(metersToPx(0),               TRACK_Y_PX);
      ctx.lineTo(metersToPx(TRACK_LENGTH_M),  TRACK_Y_PX);
      ctx.stroke();
    }

    function drawMarker(x_px, label) {
      ctx.strokeStyle = COLOR_MARKER;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x_px, 280);
      ctx.lineTo(x_px, 440);
      ctx.stroke();

      ctx.fillStyle = COLOR_LABEL;
      ctx.font = 'bold 18px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(label, x_px, 268);
    }

    function drawWall() {
      const x = metersToPx(RIGHT_WALL_X_M);
      ctx.fillStyle = COLOR_WALL;
      ctx.fillRect(x, TRACK_Y_PX - 35, 8, 70);
    }

    function drawLauncher() {
      const housingLeft   = 60;
      const housingRight  = TRACK_LEFT_X_PX;
      const housingTop    = TRACK_Y_PX - 35;
      const housingBottom = TRACK_Y_PX + 35;
      const housingWidth  = housingRight - housingLeft;
      const housingHeight = housingBottom - housingTop;

      ctx.strokeStyle = COLOR_LAUNCHER;
      ctx.lineWidth = 3;
      ctx.strokeRect(housingLeft, housingTop, housingWidth, housingHeight);

      const innerPadding      = 6;
      const maxLoadedFraction = 0.85;
      const minLoadedFraction = 0.40;
      const relaxedFraction   = 1.00;

      const loadedFraction =
        maxLoadedFraction
        - ((state.currentNotch - 1) / 3) * (maxLoadedFraction - minLoadedFraction);

      let springFraction;
      if (state.springAnimating) {
        const progress = clamp01(state.springAnimElapsed_s / SPRING_RELEASE_DURATION_S);
        const eased    = 1 - (1 - progress) * (1 - progress);
        springFraction = loadedFraction + (relaxedFraction - loadedFraction) * eased;
      } else if (state.springReleased) {
        springFraction = relaxedFraction;
      } else {
        springFraction = loadedFraction;
      }

      const springLength = (housingWidth - 2 * innerPadding) * springFraction;
      const springLeft   = housingLeft + innerPadding;
      const springRight  = springLeft + springLength;
      const springY      = TRACK_Y_PX;
      const amplitude    = 10;
      const numZigs      = 5;

      ctx.strokeStyle = COLOR_LAUNCHER;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(springLeft, springY);
      for (let i = 1; i <= numZigs; i++) {
        const x = springLeft + (i / numZigs) * springLength;
        const y = springY + (i % 2 === 1 ? -amplitude : amplitude);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(springRight, springY);
      ctx.stroke();

      ctx.fillStyle = COLOR_LAUNCHER;
      ctx.fillRect(springRight - 2, springY - 14, 4, 28);
    }

    function drawBall() {
      const x = metersToPx(state.ballX_m);
      ctx.fillStyle = COLOR_BALL_FILL;
      ctx.beginPath();
      ctx.arc(x, TRACK_Y_PX, BALL_RADIUS_PX, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = COLOR_BALL_RIM;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function render() {
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawTrack();
      drawLauncher();
      drawWall();
      drawMarker(metersToPx(MARKER_A_X_M), 'A');
      drawMarker(metersToPx(MARKER_B_X_M), 'B');
      drawBall();
    }

    function launch() {
      if (state.isMoving) return;
      const meanSpeed = NOTCH_SPEEDS[state.currentNotch];
      const sigma     = VARIABILITY_FRACTION * meanSpeed;
      let v = sampleGaussian(meanSpeed, sigma);
      if (v < VELOCITY_FLOOR_MPS) v = VELOCITY_FLOOR_MPS;

      state.ballX_m          = 0;
      state.ballVelocity_mps = v;
      state.isMoving         = true;
      launchBtn.disabled     = true;

      state.springReleased      = false;
      state.springAnimating     = true;
      state.springAnimElapsed_s = 0;
    }

    function resetApparatus() {
      state.isMoving         = false;
      state.ballVelocity_mps = 0;
      state.ballX_m          = 0;
      launchBtn.disabled     = false;

      state.springAnimating     = false;
      state.springAnimElapsed_s = 0;
      state.springReleased      = false;
    }

    function tick(timestamp) {
      if (state.lastFrameTime === null) state.lastFrameTime = timestamp;
      const dt_real = (timestamp - state.lastFrameTime) / 1000;
      state.lastFrameTime = timestamp;

      const dt_real_clamped = Math.min(dt_real, 0.1);
      const dt_sim = dt_real_clamped * state.playbackMultiplier;

      if (state.isMoving) {
        state.ballX_m += state.ballVelocity_mps * dt_sim;
        if (state.ballX_m >= RIGHT_WALL_X_M) {
          state.ballX_m          = RIGHT_WALL_X_M;
          state.ballVelocity_mps = 0;
          state.isMoving         = false;
          launchBtn.disabled     = false;
        }
      }

      if (state.springAnimating) {
        state.springAnimElapsed_s += dt_sim;
        if (state.springAnimElapsed_s >= SPRING_RELEASE_DURATION_S) {
          state.springAnimating = false;
          state.springReleased  = true;
        }
      }

      render();
      requestAnimationFrame(tick);
    }

    notchBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        notchBtns.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        state.currentNotch = parseInt(btn.dataset.notch, 10);
        state.springAnimating     = false;
        state.springAnimElapsed_s = 0;
        state.springReleased      = false;
      });
    });

    launchBtn.addEventListener('click', launch);
    resetBtn.addEventListener('click', resetApparatus);

    speedSelect.addEventListener('change', function (e) {
      state.playbackMultiplier = parseFloat(e.target.value);
    });

    const stopwatch = new Stopwatch({
      container: sceneWrap,
      x: 880,
      y: 40,
    });

    const ruler = new Ruler({
      container:      sceneWrap,
      x:              TRACK_LEFT_X_PX,
      y:              290,
      pixelsPerMeter: PIXELS_PER_METER,
    });

    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
